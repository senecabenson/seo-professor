<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SEO Professor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream:    #fafaf7;
      --ink:      #0f0f0f;
      --ink-muted:#4a4a44;
      --rule:     #d4d4c8;
      --red:      #c41f1f;
      --green:    #16a34a;
      --amber:    #b45309;
      --orange:   #c2410c;
      --blue:     #1d4ed8;
      --mono:     'Courier Prime', Courier, monospace;
      --serif:    'Fraunces', Georgia, serif;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--cream);
      color: var(--ink);
      font-family: var(--mono);
      font-size: 15px;
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ─── MASTHEAD ─────────────────────────────────── */
    .masthead {
      border-bottom: 3px double var(--ink);
      padding: 20px 40px 16px;
      display: flex;
      align-items: baseline;
      gap: 24px;
    }

    .masthead-name {
      font-family: var(--serif);
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -0.5px;
      font-style: italic;
    }

    .masthead-rule {
      flex: 1;
      height: 1px;
      background: var(--ink);
      opacity: 0.2;
      align-self: center;
    }

    .masthead-tagline {
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--ink-muted);
    }

    /* ─── LAYOUT ───────────────────────────────────── */
    .page {
      max-width: 860px;
      margin: 0 auto;
      padding: 48px 40px 80px;
    }

    /* ─── SECTION: IDLE ────────────────────────────── */
    #section-idle {
      padding-top: 64px;
    }

    .headline {
      font-family: var(--serif);
      font-size: clamp(42px, 8vw, 80px);
      font-weight: 900;
      line-height: 0.95;
      letter-spacing: -2px;
      margin-bottom: 12px;
    }

    .headline em {
      font-style: italic;
      color: var(--red);
    }

    .subhead {
      font-family: var(--mono);
      font-size: 13px;
      color: var(--ink-muted);
      letter-spacing: 0.04em;
      margin-bottom: 48px;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--rule);
    }

    .audit-form {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .input-row {
      display: flex;
      gap: 0;
      border: 2px solid var(--ink);
    }

    .url-input {
      flex: 1;
      padding: 16px 20px;
      font-family: var(--mono);
      font-size: 16px;
      border: none;
      background: #fff;
      color: var(--ink);
      outline: none;
    }

    .url-input::placeholder { color: #b0b0a8; }

    .submit-btn {
      padding: 16px 28px;
      background: var(--ink);
      color: var(--cream);
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border: none;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }

    .submit-btn:hover { background: var(--red); }
    .submit-btn:disabled { background: #888; cursor: not-allowed; }

    .form-options {
      display: flex;
      gap: 24px;
      align-items: center;
      flex-wrap: wrap;
    }

    .form-options label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--ink-muted);
      cursor: pointer;
    }

    .form-options input[type=checkbox],
    .form-options input[type=number] {
      accent-color: var(--red);
      font-family: var(--mono);
    }

    .form-options input[type=number] {
      width: 72px;
      padding: 4px 8px;
      border: 1px solid var(--rule);
      background: #fff;
      font-family: var(--mono);
      font-size: 13px;
    }

    /* ─── SECTION: PROGRESS ────────────────────────── */
    #section-progress { display: none; padding-top: 64px; }

    .progress-domain {
      font-family: var(--serif);
      font-size: 32px;
      font-weight: 800;
      font-style: italic;
      margin-bottom: 32px;
    }

    .progress-steps {
      display: flex;
      flex-direction: column;
      gap: 0;
      margin-bottom: 32px;
      border: 2px solid var(--ink);
    }

    .step {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 14px 20px;
      border-bottom: 1px solid var(--rule);
      font-size: 13px;
      color: var(--ink-muted);
      transition: background 0.2s;
    }

    .step:last-child { border-bottom: none; }

    .step.active {
      background: var(--ink);
      color: var(--cream);
    }

    .step.done {
      background: #f0f7f0;
      color: var(--green);
    }

    .step-indicator {
      width: 20px;
      height: 20px;
      border: 2px solid currentColor;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 700;
    }

    .step.active .step-indicator {
      animation: pulse-ring 1s ease-in-out infinite;
    }

    @keyframes pulse-ring {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.3); opacity: 0.6; }
    }

    .step.done .step-indicator::after { content: '✓'; }

    .progress-msg {
      font-size: 14px;
      color: var(--ink-muted);
      font-style: italic;
    }

    /* ─── SECTION: ERROR ───────────────────────────── */
    #section-error {
      display: none;
      padding-top: 64px;
    }

    .error-block {
      border: 2px solid var(--red);
      padding: 32px;
      background: #fff5f5;
    }

    .error-label {
      font-family: var(--serif);
      font-size: 22px;
      font-weight: 800;
      color: var(--red);
      margin-bottom: 12px;
    }

    .error-text {
      font-size: 13px;
      color: var(--ink-muted);
      margin-bottom: 24px;
    }

    .retry-btn {
      padding: 12px 24px;
      border: 2px solid var(--ink);
      background: transparent;
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.15s;
    }

    .retry-btn:hover { background: var(--ink); color: var(--cream); }

    /* ─── SECTION: RESULTS ─────────────────────────── */
    #section-results { display: none; }

    .results-hr {
      border: none;
      border-top: 3px double var(--ink);
      margin: 40px 0;
    }

    /* Score header */
    .report-header {
      padding: 40px 0 32px;
      border-bottom: 1px solid var(--rule);
    }

    .report-meta {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 32px;
    }

    .report-domain {
      font-family: var(--serif);
      font-size: 28px;
      font-weight: 800;
      font-style: italic;
    }

    .report-date {
      font-size: 12px;
      color: var(--ink-muted);
      letter-spacing: 0.04em;
    }

    .score-block {
      display: flex;
      align-items: flex-end;
      gap: 40px;
      flex-wrap: wrap;
    }

    .score-number {
      font-family: var(--serif);
      font-size: clamp(80px, 15vw, 130px);
      font-weight: 900;
      line-height: 1;
      letter-spacing: -4px;
    }

    .score-number.score-green  { color: var(--green); }
    .score-number.score-amber  { color: var(--amber); }
    .score-number.score-orange { color: var(--orange); }
    .score-number.score-red    { color: var(--red); }

    .score-meta {
      padding-bottom: 12px;
    }

    .score-label {
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink-muted);
      margin-bottom: 8px;
    }

    .severity-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .sev-badge {
      padding: 4px 12px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      border: 1.5px solid;
    }

    .sev-badge.critical { border-color: var(--red);    color: var(--red); }
    .sev-badge.high     { border-color: var(--orange);  color: var(--orange); }
    .sev-badge.medium   { border-color: var(--amber);   color: var(--amber); }
    .sev-badge.low      { border-color: var(--blue);    color: var(--blue); }

    /* Tool chips */
    .tool-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 24px;
    }

    .tool-chip {
      padding: 6px 12px;
      border: 1px solid var(--rule);
      font-size: 11px;
      background: #fff;
    }

    .tool-chip .chip-score {
      font-weight: 700;
      margin-left: 6px;
    }

    /* Sections */
    .results-section {
      padding: 32px 0;
      border-bottom: 1px solid var(--rule);
    }

    .section-eyebrow {
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--ink-muted);
      margin-bottom: 8px;
    }

    .section-title {
      font-family: var(--serif);
      font-size: 22px;
      font-weight: 800;
      margin-bottom: 20px;
      font-style: italic;
    }

    /* Executive summary */
    .exec-summary {
      font-size: 16px;
      line-height: 1.75;
      max-width: 680px;
    }

    /* Issues table */
    .issues-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    .issues-table th {
      text-align: left;
      padding: 10px 12px;
      background: var(--ink);
      color: var(--cream);
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-family: var(--mono);
    }

    .issues-table td {
      padding: 12px;
      border-bottom: 1px solid var(--rule);
      vertical-align: top;
    }

    .issues-table tr:last-child td { border-bottom: none; }
    .issues-table tr:nth-child(even) td { background: rgba(0,0,0,0.02); }

    .issue-label { font-weight: 700; }
    .issue-code  { font-size: 11px; color: var(--ink-muted); font-style: italic; }

    .count-badge {
      display: inline-block;
      padding: 2px 10px;
      background: var(--ink);
      color: var(--cream);
      font-size: 12px;
      font-weight: 700;
    }

    /* Priority fixes */
    .fix-list {
      display: flex;
      flex-direction: column;
      gap: 0;
      border: 2px solid var(--ink);
    }

    .fix-item {
      padding: 20px 24px;
      border-bottom: 1px solid var(--ink);
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: start;
    }

    .fix-item:last-child { border-bottom: none; }

    .fix-name {
      font-weight: 700;
      font-size: 14px;
      margin-bottom: 6px;
    }

    .fix-desc {
      font-size: 13px;
      color: var(--ink-muted);
      line-height: 1.6;
    }

    .fix-badges {
      display: flex;
      flex-direction: column;
      gap: 6px;
      align-items: flex-end;
      flex-shrink: 0;
    }

    .effort-impact {
      font-size: 10px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 3px 8px;
      border: 1px solid var(--rule);
      white-space: nowrap;
    }

    .effort-impact.low    { border-color: var(--green); color: var(--green); }
    .effort-impact.medium { border-color: var(--amber);  color: var(--amber); }
    .effort-impact.high   { border-color: var(--red);    color: var(--red); }

    /* Category analysis */
    .category-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 1px;
      background: var(--rule);
      border: 1px solid var(--rule);
    }

    .category-card {
      background: var(--cream);
      padding: 20px;
    }

    .cat-tool-name {
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink-muted);
      margin-bottom: 6px;
    }

    .cat-score-num {
      font-family: var(--serif);
      font-size: 42px;
      font-weight: 900;
      line-height: 1;
      margin-bottom: 10px;
    }

    .cat-assessment {
      font-size: 12px;
      color: var(--ink-muted);
      line-height: 1.55;
      margin-bottom: 10px;
    }

    .cat-issues-list {
      list-style: none;
      font-size: 12px;
    }

    .cat-issues-list li::before {
      content: '— ';
      color: var(--red);
      font-weight: 700;
    }

    /* Page breakdown */
    .page-breakdown details {
      border-bottom: 1px solid var(--rule);
    }

    .page-breakdown details:first-child {
      border-top: 1px solid var(--rule);
    }

    .page-breakdown summary {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 14px 0;
      cursor: pointer;
      list-style: none;
      font-size: 13px;
    }

    .page-breakdown summary::-webkit-details-marker { display: none; }

    .page-breakdown summary::before {
      content: '+';
      font-weight: 700;
      color: var(--red);
      font-size: 16px;
      line-height: 1;
      flex-shrink: 0;
    }

    .page-breakdown details[open] summary::before { content: '−'; }

    .page-url {
      flex: 1;
      color: var(--ink);
      word-break: break-all;
    }

    .page-score-pill {
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 700;
      padding: 2px 10px;
      border: 1.5px solid;
      flex-shrink: 0;
    }

    .page-issues-count {
      font-size: 12px;
      color: var(--ink-muted);
      flex-shrink: 0;
    }

    .page-detail-body {
      padding: 0 0 20px 24px;
    }

    .page-issue-row {
      display: flex;
      gap: 12px;
      padding: 8px 0;
      border-bottom: 1px solid var(--rule);
      font-size: 12px;
      align-items: baseline;
    }

    .page-issue-row:last-child { border-bottom: none; }

    .page-issue-sev {
      font-weight: 700;
      font-size: 10px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      flex-shrink: 0;
      width: 60px;
    }

    .page-issue-sev.critical { color: var(--red); }
    .page-issue-sev.high     { color: var(--orange); }
    .page-issue-sev.medium   { color: var(--amber); }
    .page-issue-sev.low      { color: var(--blue); }

    /* Recommendations */
    .rec-list {
      counter-reset: rec;
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .rec-item {
      counter-increment: rec;
      display: flex;
      gap: 20px;
      padding: 20px 0;
      border-bottom: 1px solid var(--rule);
      align-items: flex-start;
    }

    .rec-item:last-child { border-bottom: none; }

    .rec-num {
      font-family: var(--serif);
      font-size: 36px;
      font-weight: 900;
      line-height: 1;
      color: var(--red);
      flex-shrink: 0;
      width: 48px;
      font-style: italic;
    }

    .rec-num::before { content: counter(rec); }

    .rec-action {
      font-weight: 700;
      font-size: 14px;
      margin-bottom: 4px;
    }

    .rec-rationale {
      font-size: 13px;
      color: var(--ink-muted);
      line-height: 1.6;
    }

    /* Actions bar */
    .results-actions {
      padding-top: 40px;
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }

    .btn-primary {
      padding: 14px 28px;
      background: var(--ink);
      color: var(--cream);
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border: 2px solid var(--ink);
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn-primary:hover { background: var(--red); border-color: var(--red); }

    .btn-secondary {
      padding: 14px 28px;
      background: transparent;
      color: var(--ink);
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border: 2px solid var(--ink);
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn-secondary:hover { background: var(--ink); color: var(--cream); }

    /* Utility */
    [hidden] { display: none !important; }

    .text-muted { color: var(--ink-muted); }
    .text-mono  { font-family: var(--mono); }

    @media (max-width: 600px) {
      .masthead { padding: 16px 20px; }
      .page { padding: 32px 20px 60px; }
      .input-row { flex-direction: column; }
      .submit-btn { padding: 14px; }
      .score-block { gap: 20px; }
      .fix-item { grid-template-columns: 1fr; }
      .fix-badges { flex-direction: row; align-items: flex-start; }
    }
  </style>
</head>

<body>

  <header class="masthead">
    <span class="masthead-name">SEO Professor</span>
    <span class="masthead-rule"></span>
    <span class="masthead-tagline">Site Intelligence Report</span>
  </header>

  <main class="page">

    <!-- ──────────────────── IDLE ──────────────────── -->
    <section id="section-idle">
      <h1 class="headline">Every page<br>has a <em>story.</em></h1>
      <p class="subhead">Enter a URL to run a full technical SEO + AEO audit — crawl, analyze, report.</p>

      <form class="audit-form" id="audit-form">
        <div class="input-row">
          <input
            class="url-input"
            type="url"
            id="url-input"
            placeholder="https://example.com"
            required
            autocomplete="url"
            spellcheck="false"
          >
          <button class="submit-btn" type="submit" id="submit-btn">Run Audit</button>
        </div>
        <div class="form-options">
          <label>
            <input type="checkbox" id="single-page">
            Single page only
          </label>
          <label>
            Max pages:
            <input type="number" id="max-pages" value="50" min="1" max="200">
          </label>
        </div>
      </form>
    </section>

    <!-- ─────────────────── PROGRESS ──────────────────── -->
    <section id="section-progress">
      <div class="progress-domain" id="progress-domain"></div>

      <div class="progress-steps" id="progress-steps">
        <div class="step" data-step="QUEUED">
          <div class="step-indicator"></div>
          <span>Queued</span>
        </div>
        <div class="step" data-step="EXECUTING_CRAWL">
          <div class="step-indicator"></div>
          <span>Crawling &amp; Auditing Pages</span>
        </div>
        <div class="step" data-step="EXECUTING_AI">
          <div class="step-indicator"></div>
          <span>Running AI Analysis</span>
        </div>
        <div class="step" data-step="EXECUTING_PDF">
          <div class="step-indicator"></div>
          <span>Generating PDF Report</span>
        </div>
        <div class="step" data-step="COMPLETED">
          <div class="step-indicator"></div>
          <span>Complete</span>
        </div>
      </div>

      <p class="progress-msg text-muted" id="progress-msg">Starting…</p>
    </section>

    <!-- ──────────────────── ERROR ──────────────────── -->
    <section id="section-error">
      <div class="error-block">
        <div class="error-label">Audit Failed</div>
        <p class="error-text" id="error-text">An unexpected error occurred.</p>
        <button class="retry-btn" id="btn-retry">Try Again</button>
      </div>
    </section>

    <!-- ─────────────────── RESULTS ──────────────────── -->
    <section id="section-results">

      <!-- Header -->
      <div class="report-header" id="results-header"></div>

      <!-- Executive Summary -->
      <div class="results-section" id="results-summary"></div>

      <!-- Most Common Issues -->
      <div class="results-section" id="results-issues"></div>

      <!-- Priority Fixes -->
      <div class="results-section" id="results-fixes"></div>

      <!-- Category Analysis -->
      <div class="results-section" id="results-categories"></div>

      <!-- Page Breakdown -->
      <div class="results-section" id="results-pages"></div>

      <!-- Recommendations -->
      <div class="results-section" id="results-recommendations"></div>

      <!-- Actions -->
      <div class="results-actions">
        <button class="btn-primary" id="btn-pdf">Download PDF Report</button>
        <button class="btn-secondary" id="btn-new-audit">Run Another Audit</button>
      </div>

    </section>
  </main>

  <script>
  (() => {
    'use strict';

    // ─── State ──────────────────────────────────────────
    let currentRunId = null;
    let pollTimer = null;
    let currentOutput = null;

    const TOOL_NAMES = {
      onpage_auditor:         'On-Page SEO',
      indexation_auditor:     'Indexation',
      link_auditor:           'Links',
      image_auditor:          'Images',
      security_auditor:       'Security',
      cwv_auditor:            'Core Web Vitals',
      js_render_auditor:      'JS Rendering',
      structured_data_auditor:'Structured Data',
      authority_auditor:      'Authority / E-E-A-T',
      aeo_auditor:            'AEO / AI Search',
    };

    // Trigger.dev status → progress step mapping
    // EXECUTING is generic; we use the task's logger output but can't easily
    // distinguish sub-steps from the runs API, so we animate through phases.
    const TERMINAL_STATUSES = new Set(['COMPLETED', 'FAILED', 'CANCELED', 'TIMED_OUT', 'CRASHED', 'SYSTEM_FAILURE', 'EXPIRED']);

    // ─── Utilities ──────────────────────────────────────
    function scoreClass(score) {
      if (score >= 90) return 'score-green';
      if (score >= 70) return 'score-amber';
      if (score >= 50) return 'score-orange';
      return 'score-red';
    }

    function scoreColorHex(score) {
      if (score >= 90) return '#16a34a';
      if (score >= 70) return '#b45309';
      if (score >= 50) return '#c2410c';
      return '#c41f1f';
    }

    function escHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function capitalize(str) {
      return str ? str.charAt(0).toUpperCase() + str.slice(1) : str;
    }

    // ─── Section visibility ──────────────────────────────
    function showSection(id) {
      ['section-idle','section-progress','section-error','section-results'].forEach(s => {
        document.getElementById(s).style.display = s === id ? 'block' : 'none';
      });
    }

    // ─── Form submit ─────────────────────────────────────
    document.getElementById('audit-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const url       = document.getElementById('url-input').value.trim();
      const maxPages  = parseInt(document.getElementById('max-pages').value, 10) || 50;
      const singlePage = document.getElementById('single-page').checked;

      // Show progress
      let domain = url.replace(/^https?:\/\//, '').replace(/\/$/, '');
      document.getElementById('progress-domain').textContent = domain;
      document.getElementById('progress-msg').textContent = 'Submitting audit…';
      resetSteps();
      showSection('section-progress');

      try {
        const res = await fetch('/api/audit', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url, max_pages: maxPages, single_page: singlePage }),
        });

        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.error || `HTTP ${res.status}`);
        }

        const { run_id } = await res.json();
        currentRunId = run_id;
        startPolling();
      } catch (err) {
        showError(err.message);
      }
    });

    // ─── Polling ─────────────────────────────────────────
    let executingPhase = 0; // 0=crawl, 1=AI, 2=PDF
    const EXECUTING_STEPS = ['EXECUTING_CRAWL', 'EXECUTING_AI', 'EXECUTING_PDF'];
    let phaseTimer = null;

    function startPolling() {
      executingPhase = 0;
      setActiveStep('QUEUED');

      pollTimer = setInterval(async () => {
        try {
          const res = await fetch(`/api/status/${currentRunId}`);
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const { status, output, error } = await res.json();

          if (status === 'EXECUTING') {
            // Animate through sub-phases since Trigger.dev doesn't expose them
            if (!phaseTimer) {
              phaseTimer = setInterval(() => {
                if (executingPhase < EXECUTING_STEPS.length - 1) {
                  executingPhase++;
                  setActiveStep(EXECUTING_STEPS[executingPhase]);
                }
              }, 20000); // advance phase every 20s
            }
            setActiveStep(EXECUTING_STEPS[executingPhase]);
            const msgs = ['Crawling and auditing pages…', 'Running AI analysis…', 'Generating PDF report…'];
            document.getElementById('progress-msg').textContent = msgs[executingPhase] || 'Working…';
          } else if (status === 'QUEUED' || status === 'DEQUEUED' || status === 'PENDING_VERSION' || status === 'WAITING_FOR_DEPLOY') {
            setActiveStep('QUEUED');
            document.getElementById('progress-msg').textContent = 'Waiting for worker…';
          }

          if (TERMINAL_STATUSES.has(status)) {
            stopPolling();
            if (status === 'COMPLETED' && output) {
              setActiveStep('COMPLETED');
              currentOutput = output;
              renderResults(output);
              showSection('section-results');
            } else {
              showError(error || `Job ended with status: ${status}`);
            }
          }
        } catch (err) {
          stopPolling();
          showError(err.message);
        }
      }, 2500);
    }

    function stopPolling() {
      clearInterval(pollTimer);
      clearInterval(phaseTimer);
      pollTimer = null;
      phaseTimer = null;
    }

    // ─── Progress steps ──────────────────────────────────
    function resetSteps() {
      document.querySelectorAll('#progress-steps .step').forEach(el => {
        el.classList.remove('active', 'done');
      });
    }

    function setActiveStep(stepKey) {
      const steps = [...document.querySelectorAll('#progress-steps .step')];
      const stepKeys = steps.map(el => el.dataset.step);
      const activeIdx = stepKeys.indexOf(stepKey);

      steps.forEach((el, i) => {
        el.classList.remove('active', 'done');
        if (i < activeIdx)  el.classList.add('done');
        if (i === activeIdx) el.classList.add('active');
      });
    }

    // ─── Error ───────────────────────────────────────────
    function showError(msg) {
      document.getElementById('error-text').textContent = msg || 'An unexpected error occurred.';
      showSection('section-error');
    }

    document.getElementById('btn-retry').addEventListener('click', () => {
      stopPolling();
      showSection('section-idle');
    });

    // ─── Results rendering ───────────────────────────────
    function renderResults(output) {
      const { aggregated, ai_analysis, domain, date } = output;
      renderHeader(aggregated, domain, date);
      renderSummary(ai_analysis);
      renderIssues(aggregated);
      renderFixes(ai_analysis);
      renderCategories(aggregated, ai_analysis);
      renderPages(aggregated);
      renderRecommendations(ai_analysis);
    }

    // Header: domain, score, severity badges, tool chips
    function renderHeader(agg, domain, date) {
      const score = agg.site_score ?? 0;
      const sc = scoreClass(score);
      const sv = agg.severity_counts || {};
      const ts = agg.tool_summaries || {};

      const chipHtml = Object.entries(TOOL_NAMES).map(([key, label]) => {
        const s = ts[key]?.avg_score ?? null;
        const color = s !== null ? scoreColorHex(s) : '#aaa';
        return `<div class="tool-chip">
          ${escHtml(label)}
          <span class="chip-score" style="color:${color}">${s !== null ? s : '—'}</span>
        </div>`;
      }).join('');

      document.getElementById('results-header').innerHTML = `
        <div class="report-meta">
          <div class="report-domain">${escHtml(domain)}</div>
          <div class="report-date">${escHtml(date || '')}</div>
        </div>
        <div class="score-block">
          <div class="score-number ${sc}">${score}</div>
          <div class="score-meta">
            <div class="score-label">Overall Site Score &nbsp;/&nbsp; 100</div>
            <div class="severity-row">
              ${sv.critical ? `<span class="sev-badge critical">${sv.critical} Critical</span>` : ''}
              ${sv.high     ? `<span class="sev-badge high">${sv.high} High</span>` : ''}
              ${sv.medium   ? `<span class="sev-badge medium">${sv.medium} Medium</span>` : ''}
              ${sv.low      ? `<span class="sev-badge low">${sv.low} Low</span>` : ''}
            </div>
            <div style="margin-top:12px;font-size:12px;color:var(--ink-muted)">
              ${agg.pages_audited || 0} pages audited
            </div>
          </div>
        </div>
        <div class="tool-chips">${chipHtml}</div>
      `;
    }

    // Executive summary
    function renderSummary(ai) {
      const text = ai?.executive_summary || 'No AI summary available.';
      document.getElementById('results-summary').innerHTML = `
        <div class="section-eyebrow">Overview</div>
        <div class="section-title">Executive Summary</div>
        <p class="exec-summary">${escHtml(text)}</p>
      `;
    }

    // Most common issues table
    function renderIssues(agg) {
      const issues = (agg.top_issues || []).slice(0, 15);
      if (!issues.length) {
        document.getElementById('results-issues').innerHTML = '';
        return;
      }

      const rows = issues.map(issue => {
        const sev = issue.severity || 'low';
        const code = issue.type || '';
        return `<tr>
          <td>
            <div class="issue-label">${escHtml(code.replace(/_/g,' '))}</div>
            <div class="issue-code">${escHtml(code)}</div>
          </td>
          <td><span class="sev-badge ${sev}">${capitalize(sev)}</span></td>
          <td><span class="count-badge">${issue.count || 0}</span></td>
        </tr>`;
      }).join('');

      document.getElementById('results-issues').innerHTML = `
        <div class="section-eyebrow">Frequency Analysis</div>
        <div class="section-title">Most Common Issues</div>
        <table class="issues-table">
          <thead>
            <tr>
              <th>Issue</th>
              <th>Severity</th>
              <th>Occurrences</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      `;
    }

    // Priority fixes
    function renderFixes(ai) {
      const fixes = ai?.priority_fixes || [];
      if (!fixes.length) {
        document.getElementById('results-fixes').innerHTML = '';
        return;
      }

      const items = fixes.map(f => `
        <div class="fix-item">
          <div>
            <div class="fix-name">${escHtml(f.issue || '')}</div>
            <div class="fix-desc">${escHtml(f.description || '')}</div>
          </div>
          <div class="fix-badges">
            <span class="effort-impact ${f.effort || 'medium'}">Effort: ${capitalize(f.effort || 'medium')}</span>
            <span class="effort-impact ${f.impact || 'medium'}">Impact: ${capitalize(f.impact || 'medium')}</span>
          </div>
        </div>
      `).join('');

      document.getElementById('results-fixes').innerHTML = `
        <div class="section-eyebrow">Action Plan</div>
        <div class="section-title">Priority Fixes</div>
        <div class="fix-list">${items}</div>
      `;
    }

    // Category analysis
    function renderCategories(agg, ai) {
      const ts = agg.tool_summaries || {};
      const ca = ai?.category_analysis || {};

      const cards = Object.entries(TOOL_NAMES).map(([key, label]) => {
        const score = ts[key]?.avg_score ?? null;
        const catData = ca[key] || {};
        const assessment = catData.assessment || '';
        const keyIssues = catData.key_issues || [];
        const color = score !== null ? scoreColorHex(score) : '#aaa';

        const issuesList = keyIssues.length
          ? `<ul class="cat-issues-list">${keyIssues.map(i => `<li>${escHtml(i)}</li>`).join('')}</ul>`
          : '';

        return `
          <div class="category-card">
            <div class="cat-tool-name">${escHtml(label)}</div>
            <div class="cat-score-num" style="color:${color}">${score !== null ? score : '—'}</div>
            ${assessment ? `<div class="cat-assessment">${escHtml(assessment)}</div>` : ''}
            ${issuesList}
          </div>
        `;
      }).join('');

      document.getElementById('results-categories').innerHTML = `
        <div class="section-eyebrow">Tool Breakdown</div>
        <div class="section-title">Category Analysis</div>
        <div class="category-grid">${cards}</div>
      `;
    }

    // Page-by-page breakdown (collapsible <details>)
    function renderPages(agg) {
      const pages = agg.pages || {};
      const entries = Object.entries(pages)
        .sort(([,a],[,b]) => (a.score ?? 100) - (b.score ?? 100));

      if (!entries.length) {
        document.getElementById('results-pages').innerHTML = '';
        return;
      }

      const details = entries.map(([url, data]) => {
        const score = data.score ?? 0;
        const issues = data.issues || [];
        const color = scoreColorHex(score);

        const issueRows = issues.slice(0, 20).map(iss => `
          <div class="page-issue-row">
            <span class="page-issue-sev ${iss.severity}">${capitalize(iss.severity)}</span>
            <span>${escHtml(iss.detail || iss.type || '')}</span>
          </div>
        `).join('');

        return `
          <details>
            <summary>
              <span class="page-url">${escHtml(url)}</span>
              <span class="page-score-pill" style="border-color:${color};color:${color}">${score}</span>
              <span class="page-issues-count">${issues.length} issue${issues.length !== 1 ? 's' : ''}</span>
            </summary>
            <div class="page-detail-body">
              ${issueRows || '<p style="font-size:12px;color:var(--ink-muted)">No issues found.</p>'}
            </div>
          </details>
        `;
      }).join('');

      document.getElementById('results-pages').innerHTML = `
        <div class="section-eyebrow">Detailed Breakdown</div>
        <div class="section-title">Page by Page</div>
        <div class="page-breakdown">${details}</div>
      `;
    }

    // Recommendations
    function renderRecommendations(ai) {
      const recs = (ai?.recommendations || []).slice(0, 10);
      if (!recs.length) {
        document.getElementById('results-recommendations').innerHTML = '';
        return;
      }

      const items = recs.map(r => `
        <li class="rec-item">
          <div class="rec-num"></div>
          <div>
            <div class="rec-action">${escHtml(r.action || '')}</div>
            <div class="rec-rationale">${escHtml(r.rationale || '')}</div>
          </div>
        </li>
      `).join('');

      document.getElementById('results-recommendations').innerHTML = `
        <div class="section-eyebrow">Strategic Guidance</div>
        <div class="section-title">Recommendations</div>
        <ol class="rec-list">${items}</ol>
      `;
    }

    // ─── Actions ─────────────────────────────────────────
    document.getElementById('btn-pdf').addEventListener('click', () => {
      if (!currentOutput?.pdf_url) return;
      // Production: Supabase public URL → open directly
      // Local dev: file path → use the /api/report/:runId endpoint
      const url = currentOutput.pdf_url.startsWith('http')
        ? currentOutput.pdf_url
        : `/api/report/${currentRunId}`;
      window.open(url, '_blank');
    });

    document.getElementById('btn-new-audit').addEventListener('click', () => {
      stopPolling();
      currentRunId = null;
      currentOutput = null;
      document.getElementById('url-input').value = '';
      document.getElementById('progress-msg').textContent = 'Starting…';
      resetSteps();
      showSection('section-idle');
    });

  })();
  </script>

</body>
